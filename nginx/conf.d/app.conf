# Host nginx reverse proxy for prostak59.duckdns.org -> the Next.js app
# container published on 127.0.0.1:3000 (see docker-compose.prod.yml).
#
# Install: copy this file to /etc/nginx/conf.d/app.conf on the VPS, then
# obtain a certificate for the domain (see DEPLOY.md) before reloading nginx
# with this file in place, since the 443 server block references cert paths
# that must already exist.

# Allow larger multi-file room image uploads (default nginx limit is 1MB).
client_max_body_size 20m;

# HTTP: only serve ACME (certbot) challenges, redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name prostak59.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: reverse proxy to the Next.js container.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name prostak59.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/prostak59.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prostak59.duckdns.org/privkey.pem;

    # Self-contained modern TLS settings (no dependency on certbot's nginx
    # plugin files, since certs are obtained via the webroot method below).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required so NextAuth (and Next.js in general) sees the real
        # client IP/protocol/host instead of the internal proxy hop.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / keep-alive support (Next.js dev HMR, future use).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
